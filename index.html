<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Protected Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f1f1f;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #error {
      color: red;
      margin-top: 10px;
      text-align: center;
    }

    #content {
      display: none;
      padding: 20px;
    }

    .game {
      background: #1f1f1f;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
    }

    .logout {
      background: #dc3545;
    }

    .logout:hover {
      background: #a71d2a;
    }
  </style>
</head>
<body>

<div class="center" id="loginPage">
  <div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="error"></div>
  </div>
</div>

<div id="content">

  <h1>Protected Games</h1>

  <div class="game">
    <h2>Game 1</h2>

    <iframe src="https://example.com"></iframe>
  </div>

  <div class="game">
    <h2>Game 2</h2>

    <iframe src="https://example.com"></iframe>
  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<script>
  // USERS
  const users = {
    admin: "1234",
    wyatt: "games"
  };

  // AUTO LOGIN
  if (localStorage.getItem("loggedIn") === "yes") {
    showContent();
  }

  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (users[user] && users[user] === pass) {
      localStorage.setItem("loggedIn", "yes");
      localStorage.setItem("username", user);

      showContent();
    } else {
      document.getElementById("error").innerText =
        "Incorrect username or password";
    }
  }

  function showContent() {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("content").style.display = "block";
  }

  function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("username");

    location.reload();
  }
</script>

</body>
</html>
