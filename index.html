<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f1f1f;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #007bff;
      color: white;
    }

    button:hover {
      background: #0056b3;
    }

    #error {
      color: red;
      margin-top: 10px;
      text-align: center;
    }

    #content {
      display: none;
      padding: 20px;
    }

    .game {
      background: #1f1f1f;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
    }

    .logout {
      background: #dc3545;
    }

    .logout:hover {
      background: #a71d2a;
    }

    #adminPanel {
      margin-top: 20px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="loginPage">
  <div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>

    <div id="error"></div>
  </div>
</div>

<!-- CONTENT -->
<div id="content">

  <h1>Protected Games</h1>
  <p id="welcome"></p>

  <div class="game">
    <h2>Game 1</h2>
    <iframe src="https://example.com"></iframe>
  </div>

  <div class="game">
    <h2>Game 2</h2>
    <iframe src="https://example.com"></iframe>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none;">
    <h2>Admin Panel</h2>
    <div id="userList"></div>
  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<script src="script.js"></script>

</body>
</html>
