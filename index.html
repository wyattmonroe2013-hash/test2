<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game CMS System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f1f1f;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #007bff;
      color: white;
      font-size: 14px;
    }

    button:hover {
      background: #0056b3;
    }

    #error {
      margin-top: 10px;
      color: red;
      text-align: center;
    }

    #content {
      display: none;
      padding: 20px;
    }

    .game {
      background: #1f1f1f;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
    }

    #pages {
      margin-top: 20px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
    }

    .logout {
      background: #dc3545;
    }

    .logout:hover {
      background: #a71d2a;
    }

    h2, h3 {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="center" id="loginPage">
  <div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>

    <div id="error"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="content">

  <h1>Game CMS System</h1>
  <p id="welcome"></p>

  <!-- DYNAMIC PAGES -->
  <div id="pages"></div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h2>Admin Panel</h2>

    <button onclick="createUser()">Create User/Admin</button>
    <button onclick="createPage()">Create Page</button>

    <h3>Users</h3>
    <div id="userList"></div>

    <h3>Pages</h3>
    <div id="pageList"></div>
  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
