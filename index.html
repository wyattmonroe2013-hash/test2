<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game CMS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f1f1f;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff;
      color: white;
    }

    #content {
      display: none;
      padding: 20px;
    }

    .game {
      background: #222;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      background: #222;
      padding: 15px;
      border-radius: 10px;
    }

    .logout {
      background: red;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="loginPage">
  <div class="box">
    <h2>Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>

    <p id="error"></p>
  </div>
</div>

<!-- CONTENT -->
<div id="content">

  <h1>Game CMS</h1>
  <p id="welcome"></p>

  <div id="pages"></div>

  <!-- ADMIN -->
  <div id="adminPanel">
    <h2>Admin Panel</h2>

    <button onclick="createUser()">Create User/Admin</button>
    <button onclick="createPage()">Create Page</button>

    <h3>Users</h3>
    <div id="userList"></div>

    <h3>Pages</h3>
    <div id="pageList"></div>
  </div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>

</body>
</html>
