<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="main">

    <!-- LOGIN / SIGNUP -->
    <div class="login">

        <a href="./login.html" class="nav-btn">
            <h2>LOGIN |</h2>
        </a>

        <a href="./signup.html" class="nav-btn">
            <h2>SIGNUP</h2>
        </a>

    </div>

    <!-- LOGIN BOX -->
    <div id="passwordScreen" class="password-box">

        <h1>Game Login</h1>

        <!-- USERNAME -->
        <label for="usernameInput">
            Username
        </label>

        <input
            type="text"
            id="usernameInput"
            placeholder="Enter username"
        >

        <!-- PASSWORD -->
        <label for="passwordInput">
            Password
        </label>

        <input
            type="password"
            id="passwordInput"
            placeholder="Enter password"
        >

        <button onclick="checkLogin()">
            Login
        </button>

        <p id="errorText"></p>

    </div>

    <!-- HIDDEN MAIN CONTENT -->
    <div id="mainContent" style="display:none;">

        <header>

            <h1>Home</h1>

            <input
                type="text"
                id="searchBar"
                placeholder="Search games..."
            >

        </header>

        <!-- GAMES -->
        <main id="gameGrid" class="game-grid">

            <div class="game-card">
                <h3>Minecraft</h3>
            </div>

            <div class="game-card">
                <h3>Roblox</h3>
            </div>

            <div class="game-card">
                <h3>Geometry Dash</h3>
            </div>

        </main>

    </div>

    <script>

        // MULTIPLE ACCOUNTS
        const accounts = [

            {
                username: "admin",
                password: "admin123"
            },

            {
                username: "wyatt",
                password: "emerald"
            },

            {
                username: "guest",
                password: "guest123"
            }

        ];

        function checkLogin(){

            const enteredUsername =
                document.getElementById("usernameInput").value;

            const enteredPassword =
                document.getElementById("passwordInput").value;

            let validLogin = false;

            // CHECK ALL ACCOUNTS
            for(let i = 0; i < accounts.length; i++){

                if(
                    enteredUsername === accounts[i].username &&
                    enteredPassword === accounts[i].password
                ){
                    validLogin = true;
                    break;
                }
            }

            // IF LOGIN IS CORRECT
            if(validLogin){

                document.getElementById("passwordScreen")
                    .style.display = "none";

                document.getElementById("mainContent")
                    .style.display = "block";

            }

            // IF LOGIN IS WRONG
            else{

                document.getElementById("errorText")
                    .innerText = "Wrong username or password";

            }

        }

    </script>

</body>
</html>
