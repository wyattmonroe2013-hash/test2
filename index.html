<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game CMS</title>

  <style>
    body { font-family: Arial; background:#111; color:white; margin:0; }
    .center { height:100vh; display:flex; align-items:center; justify-content:center; }
    .box { background:#222; padding:20px; border-radius:10px; width:300px; }
    input, button { width:100%; padding:10px; margin-top:10px; }
    button { cursor:pointer; }
    #content { display:none; padding:20px; }
    .game { background:#333; padding:10px; margin-top:10px; border-radius:8px; }
    #adminPanel { display:none; margin-top:20px; padding:10px; background:#1a1a1a; }
    .hidden { display:none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="loginPage">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <p id="error"></p>
  </div>
</div>

<!-- MAIN -->
<div id="content">
  <h1>Game CMS</h1>
  <p id="welcome"></p>

  <div id="pages"></div>

  <div id="adminPanel">
    <h2>Admin Panel</h2>

    <button onclick="openTab('users')">Users</button>
    <button onclick="openTab('pages')">Pages</button>
    <button onclick="openTab('settings')">Settings</button>

    <div id="tab-users">
      <input id="userSearch" placeholder="Search users..." oninput="renderUsers()">
      <div id="userList"></div>
    </div>

    <div id="tab-pages" class="hidden">
      <button onclick="createPage()">Create Page</button>
    </div>

    <div id="tab-settings" class="hidden">
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <button onclick="logout()" style="background:red; margin-top:20px;">Logout</button>
</div>

<script src="script.js"></script>

</body>
</html>
